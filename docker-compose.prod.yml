x-production-environment: &production-environment
  APP_ENV: production
  APP_SECRET_KEY: ${APP_SECRET_KEY:?APP_SECRET_KEY must be configured}
  ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?ALLOWED_ORIGINS must be configured}
  JWT_ALGORITHM: RS256
  JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:?JWT_PRIVATE_KEY must be configured}
  JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:?JWT_PUBLIC_KEY must be configured}
  AI_PROVIDER: ${AI_PROVIDER:-gemini}
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}
  GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.5-flash-lite}
  GEMINI_API_URL: ${GEMINI_API_URL:-https://generativelanguage.googleapis.com/v1beta}
  GEMINI_TIMEOUT_SECONDS: ${GEMINI_TIMEOUT_SECONDS:-30}

services:
  api:
    build:
      target: runtime
    command: ["sh", "-c", "alembic upgrade head && python -m app.cli.bootstrap_admin && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    environment: *production-environment

  frontend:
    build:
      target: production
    volumes: !reset []

  reverse-proxy:
    volumes:
      - ./infra/reverse-proxy/nginx.prod.conf:/etc/nginx/nginx.conf:ro

  scanner-worker:
    environment: *production-environment

  protection-worker:
    environment: *production-environment

  scheduler:
    environment: *production-environment

  waf:
    environment:
      MODSEC_RULE_ENGINE: "On"
      NGINX_ALWAYS_TLS_REDIRECT: "on"
      SSL_PROTOCOLS: "TLSv1.2 TLSv1.3"
      SERVER_NAME: ${SERVER_NAME:?SERVER_NAME must be configured}
      CORS_HEADER_403_ALLOW_ORIGIN: ${WAF_CORS_ALLOW_ORIGIN:?WAF_CORS_ALLOW_ORIGIN must be configured}
    volumes:
      - ./infra/waf/REQUEST-900-EXCLUSION-RULES-BEFORE-CRS.conf:/etc/modsecurity.d/owasp-crs/rules/REQUEST-900-EXCLUSION-RULES-BEFORE-CRS.conf:ro
      - ${TLS_CERT_PATH:?TLS_CERT_PATH must be configured}:/etc/nginx/conf/server.crt:ro
      - ${TLS_KEY_PATH:?TLS_KEY_PATH must be configured}:/etc/nginx/conf/server.key:ro
